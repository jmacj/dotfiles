# =============================================================================
# ~/.config/tmux/tmux.conf  —  tmux configuration
# =============================================================================

# ---- Prefix -----------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---- General ----------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"  # true color support
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -g mouse on
setw -g aggressive-resize on
set -s escape-time 0           # fix escape lag in vim

# ---- Indexing ---------------------------------------------------------------
set -g base-index 1            # windows start at 1
setw -g pane-base-index 1      # panes start at 1
set -g renumber-windows on     # renumber on close

# ---- Reload config ----------------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ---- Pane splitting (intuitive keys) ----------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ---- Pane navigation (vim keys) ---------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---- Pane resizing ----------------------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---- Windows ----------------------------------------------------------------
bind c new-window -c "#{pane_current_path}"  # new window in current dir
bind n next-window
bind p previous-window

# ---- Vi copy mode -----------------------------------------------------------
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ---- Status bar -------------------------------------------------------------
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[bold,fg=#89b4fa] #S #[fg=#6c7086]│ "
set -g status-left-length 30
set -g status-right "#[fg=#6c7086]%Y-%m-%d  #[bold,fg=#89b4fa]%H:%M "
set -g status-right-length 40

# Window tabs
setw -g window-status-format         "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[bold,fg=#89b4fa,bg=#313244] #I:#W "

# ---- Pane borders -----------------------------------------------------------
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
